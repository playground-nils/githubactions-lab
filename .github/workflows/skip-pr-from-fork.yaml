name: skip pr from fork
'on':
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
    types:
    - opened
    - synchronize
jobs:
  build:
    if: ${{ (github.event_name == 'push' && github.repository_owner == 'playground-nils')
      || startsWith(github.event.pull_request.head.label, 'guitarrapc:') }}
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
    - run: echo build
